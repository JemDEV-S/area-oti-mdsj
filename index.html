<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTI Practicantes | Línea del Tiempo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk','sans-serif'],
            mono: ['JetBrains Mono','monospace']
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg:#06080d;--bg2:#0c1018;--fg:#e8eaf0;--muted:#6b7394;
      --accent:#00f0ff;--accent2:#00ff88;--accent3:#ffaa00;
      --accent4:#ff6b6b;--accent5:#f97316;--accent6:#84cc16;
      --card:#111623;--border:#1e2640;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--accent)}

    /* Etiquetas de nodos 3D */
    .node-label{
      position:absolute;pointer-events:none;transform:translate(-50%,-130%);
      padding:5px 12px;background:rgba(6,8,13,0.9);border:1px solid var(--border);
      border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;
      white-space:nowrap;opacity:0;transition:opacity .3s;backdrop-filter:blur(6px);
    }
    .node-label.visible{opacity:1}
    .node-label .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

    /* Panel de detalle */
    .detail-backdrop{position:fixed;inset:0;background:rgba(6,8,13,0.6);z-index:90;opacity:0;pointer-events:none;transition:opacity .4s}
    .detail-backdrop.open{opacity:1;pointer-events:auto}
    .detail-panel{
      position:fixed;right:-500px;top:0;width:460px;max-width:92vw;height:100vh;
      background:linear-gradient(160deg,var(--card) 0%,#080c16 100%);
      border-left:1px solid var(--border);z-index:100;
      transition:right .55s cubic-bezier(.16,1,.3,1);overflow-y:auto;padding:40px 32px;
    }
    .detail-panel.open{right:0}
    .detail-panel .close-btn{
      position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;
      background:var(--bg);border:1px solid var(--border);color:var(--muted);
      cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;
    }
    .detail-panel .close-btn:hover{border-color:var(--accent);color:var(--accent)}
    .skill-tag{
      display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;
      font-family:'JetBrains Mono',monospace;margin:3px;border:1px solid;
    }

    /* Cohorte badges */
    .cohort-badge{
      display:inline-flex;align-items:center;gap:6px;padding:5px 14px;
      border-radius:20px;font-size:12px;font-family:'JetBrains Mono',monospace;
      background:rgba(255,255,255,0.03);border:1px solid var(--border);
    }
    .cohort-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fa-spin{animation:spin 1s linear infinite}

    @media(max-width:768px){
      .detail-panel{width:100%;max-width:100vw;right:-100%}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>

  <!-- Navegación -->
  <nav class="fixed top-0 w-full z-50 backdrop-blur-xl bg-[#06080dcc] border-b border-[var(--border)]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="#" class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-[var(--accent)] to-[var(--accent2)] flex items-center justify-center">
          <i class="fas fa-terminal text-[var(--bg)] text-sm"></i>
        </div>
        <span class="font-display font-800 text-lg tracking-tight">OTI<span class="text-[var(--accent)]">.</span></span>
      </a>
      <div class="flex items-center gap-6 text-sm font-mono text-[var(--muted)]">
        <a href="#timeline" class="hover:text-[var(--accent)] transition-colors hidden sm:inline">Timeline</a>
        <span id="intern-count" class="text-xs hidden sm:inline"></span>
      </div>
    </div>
  </nav>

  <main>
    <!-- Sección de la Espiral 3D -->
    <section id="timeline" class="relative w-full" style="height:100vh;min-height:600px">
      <div id="spiral-container" class="absolute inset-0">
        <canvas id="spiral-canvas"></canvas>
      </div>
      <div id="labels-container" class="absolute inset-0 pointer-events-none" style="z-index:10"></div>

      <!-- Loading state -->
      <div id="loading" class="absolute inset-0 flex items-center justify-center z-30 font-mono text-sm text-[var(--muted)]">
        <i class="fas fa-circle-notch fa-spin mr-2"></i> Cargando practicantes...
      </div>

      <!-- Overlay: Título -->
      <div class="absolute top-24 left-6 sm:left-12 z-20 pointer-events-none" style="animation:fadeInUp .8s ease-out both">
        <h1 class="font-display font-900 text-5xl sm:text-7xl tracking-tighter leading-none">
          <span class="text-[var(--fg)]">Practi</span><span class="text-[var(--accent)]">cantes</span>
        </h1>
        <p class="font-mono text-[var(--muted)] text-sm mt-3 max-w-xs leading-relaxed">
          La historia de quienes pasaron por la Oficina de Tecnologias de la Informacion
        </p>
      </div>

      <!-- Overlay: Leyenda de cohortes (dinámica) -->
      <div id="cohort-legend" class="absolute bottom-20 left-6 sm:left-12 z-20 pointer-events-none flex flex-wrap gap-2" style="animation:fadeInUp 1s .3s ease-out both"></div>

      <!-- Overlay: Instrucciones -->
      <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 font-mono text-[var(--muted)] text-xs flex items-center gap-4" style="animation:fadeInUp 1s .6s ease-out both">
        <span><i class="fas fa-arrows-rotate mr-1"></i> Arrastra para rotar</span>
        <span><i class="fas fa-hand-pointer mr-1"></i> Click en un nodo</span>
        <span><i class="fas fa-magnifying-glass mr-1"></i> Scroll para zoom</span>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="border-t border-[var(--border)] py-10 px-6">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 text-sm font-mono text-[var(--muted)]">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-[var(--accent)] to-[var(--accent2)] flex items-center justify-center">
          <i class="fas fa-terminal text-[var(--bg)] text-[10px]"></i>
        </div>
        <span>OTI Practicantes &copy; <span id="footer-year"></span></span>
      </div>
      <div class="flex items-center gap-4">
        <span>Construido con Three.js + Talento</span>
        <span class="text-[var(--accent)]"><i class="fas fa-heart"></i></span>
      </div>
    </div>
  </footer>

  <!-- Panel de Detalle -->
  <div class="detail-backdrop" id="detail-backdrop"></div>
  <div class="detail-panel" id="detail-panel" role="dialog" aria-label="Detalle del practicante">
    <button class="close-btn" id="close-detail" aria-label="Cerrar panel"><i class="fas fa-xmark"></i></button>
    <div id="detail-content"></div>
  </div>

  <!-- Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Estado global ───
    let cohortColors = [];
    let interns = [];

    // ─── Variables de escena ───
    const canvas = document.getElementById('spiral-canvas');
    const container = document.getElementById('spiral-container');
    const labelsContainer = document.getElementById('labels-container');
    let scene, camera, renderer, controls;
    let nodeMeshes = [];
    let labelElements = [];
    let raycaster, mouse;
    let spiralVisible = true;
    let clock = new THREE.Clock();
    let hoveredNode = null;
    let tubeMaterial, haloMaterial;

    // ─── Clase Curva Helicoidal ───
    class HelixCurve extends THREE.Curve {
      constructor(radius = 5, height = 24, turns = 3) {
        super();
        this.radius = Math.max(0.1, radius);
        this.height = Math.max(0.1, height);
        this.turns = Math.max(1, turns);
      }
      getPoint(t, optionalTarget = new THREE.Vector3()) {
        const angle = t * Math.PI * 2 * this.turns;
        return optionalTarget.set(
          this.radius * Math.cos(angle),
          (t - 0.5) * this.height,
          this.radius * Math.sin(angle)
        );
      }
    }

    const helix = new HelixCurve(5, 24, 3);

    // ─── Textura de resplandor ───
    function createGlowTexture() {
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      g.addColorStop(0,    'rgba(255,255,255,1)');
      g.addColorStop(0.15, 'rgba(255,255,255,0.6)');
      g.addColorStop(0.4,  'rgba(255,255,255,0.15)');
      g.addColorStop(1,    'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(c);
    }

    const glowTexture = createGlowTexture();

    // ─── Cargar datos e inicializar ───
    async function loadAndInit() {
      try {
        const res = await fetch('/api/interns');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        cohortColors = data.cohorts.map(c => c.color);
        interns = data.interns;

        // Leyenda de cohortes
        document.getElementById('cohort-legend').innerHTML = data.cohorts
          .map(c => `<div class="cohort-badge"><span class="cohort-dot" style="background:${c.color}"></span>${c.label}</div>`)
          .join('');

        // Contador en nav
        document.getElementById('intern-count').textContent = `${interns.length} practicantes`;

        document.getElementById('loading').style.display = 'none';
        init();
        animate();
      } catch (err) {
        const el = document.getElementById('loading');
        el.innerHTML = '<i class="fas fa-triangle-exclamation mr-2" style="color:var(--accent4)"></i> Error cargando datos.';
        console.error(err);
      }
    }

    // ─── Inicializar escena ───
    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x06080d, 0.018);

      const aspect = container.clientWidth / container.clientHeight;
      camera = new THREE.PerspectiveCamera(55, aspect, 0.1, 200);
      camera.position.set(14, 6, 14);

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x06080d, 1);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.4;
      controls.minDistance = 6;
      controls.maxDistance = 35;
      controls.maxPolarAngle = Math.PI * 0.85;
      controls.minPolarAngle = Math.PI * 0.15;

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      createSpiral();
      createNodes();
      createParticles();
      createAmbientLights();

      window.addEventListener('resize', onResize);
      canvas.addEventListener('click', onCanvasClick);
      canvas.addEventListener('mousemove', onCanvasMouseMove);

      const observer = new IntersectionObserver(entries => {
        spiralVisible = entries[0].isIntersecting;
      }, { threshold: 0.05 });
      observer.observe(container);
    }

    // ─── Crear espiral (tubo) ───
    function createSpiral() {
      const tubeGeo = new THREE.TubeGeometry(helix, 500, 0.07, 8, false);
      tubeMaterial = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uTime;
          varying vec2 vUv;
          void main() {
            float flow1 = fract(vUv.x * 4.0 - uTime * 0.12);
            float pulse1 = smoothstep(0.0, 0.12, flow1) * smoothstep(0.3, 0.12, flow1);
            float flow2 = fract(vUv.x * 2.5 - uTime * 0.08 + 0.5);
            float pulse2 = smoothstep(0.0, 0.08, flow2) * smoothstep(0.2, 0.08, flow2);
            vec3 c1 = vec3(0.0, 0.94, 1.0);
            vec3 c2 = vec3(0.0, 1.0, 0.53);
            vec3 c3 = vec3(1.0, 0.67, 0.0);
            vec3 c4 = vec3(1.0, 0.42, 0.42);
            vec3 col = mix(c1, c2, smoothstep(0.0, 0.35, vUv.x));
            col = mix(col, c3, smoothstep(0.35, 0.65, vUv.x));
            col = mix(col, c4, smoothstep(0.65, 1.0, vUv.x));
            float alpha = 0.06 + pulse1 * 0.55 + pulse2 * 0.25;
            gl_FragColor = vec4(col * (0.6 + pulse1 * 0.8), alpha);
          }
        `,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      scene.add(new THREE.Mesh(tubeGeo, tubeMaterial));

      const haloGeo = new THREE.TubeGeometry(helix, 500, 0.35, 8, false);
      haloMaterial = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform float uTime;
          void main() {
            float glow = 0.015 + 0.01 * sin(vUv.x * 20.0 + uTime * 2.0);
            gl_FragColor = vec4(0.0, 0.94, 1.0, glow);
          }
        `,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      scene.add(new THREE.Mesh(haloGeo, haloMaterial));
    }

    // ─── Crear nodos de practicantes ───
    function createNodes() {
      interns.forEach((intern, i) => {
        const t = (i + 0.5) / interns.length;
        const point = helix.getPoint(t);
        const color = new THREE.Color(cohortColors[intern.cohort]);

        const node = new THREE.Mesh(
          new THREE.OctahedronGeometry(Math.max(0.01, 0.28), 0),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
        );
        node.position.copy(point);
        node.userData = { intern, index: i, baseScale: 1 };
        scene.add(node);
        nodeMeshes.push(node);

        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
          map: glowTexture,
          color,
          blending: THREE.AdditiveBlending,
          transparent: true,
          opacity: 0.45,
          depthWrite: false
        }));
        sprite.scale.set(2.2, 2.2, 1);
        sprite.position.copy(point);
        scene.add(sprite);
        node.userData.sprite = sprite;

        const ring = new THREE.Mesh(
          new THREE.RingGeometry(Math.max(0.01, 0.5), Math.max(0.02, 0.55), 32),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false })
        );
        ring.position.copy(point);
        ring.lookAt(camera.position);
        scene.add(ring);
        node.userData.ring = ring;

        const label = document.createElement('div');
        label.className = 'node-label';
        label.innerHTML = `<span class="dot" style="background:${cohortColors[intern.cohort]}"></span>${intern.name}`;
        labelsContainer.appendChild(label);
        labelElements.push({ element: label, node });
      });
    }

    // ─── Partículas ambientales ───
    function createParticles() {
      const count = 1500;
      const positions = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      for (let i = 0; i < count; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * 50;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 35;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
        sizes[i] = Math.random() * 0.08 + 0.02;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const pc = document.createElement('canvas');
      pc.width = 32; pc.height = 32;
      const pctx = pc.getContext('2d');
      const pg = pctx.createRadialGradient(16, 16, 0, 16, 16, 16);
      pg.addColorStop(0,   'rgba(255,255,255,1)');
      pg.addColorStop(0.5, 'rgba(255,255,255,0.2)');
      pg.addColorStop(1,   'rgba(255,255,255,0)');
      pctx.fillStyle = pg;
      pctx.fillRect(0, 0, 32, 32);

      const particles = new THREE.Points(geo, new THREE.PointsMaterial({
        map: new THREE.CanvasTexture(pc),
        size: 0.12,
        color: 0x4488aa,
        transparent: true,
        opacity: 0.35,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        sizeAttenuation: true
      }));
      scene.add(particles);
      scene.userData.particles = particles;
    }

    // ─── Luces ───
    function createAmbientLights() {
      scene.add(new THREE.AmbientLight(0x223344, 0.5));
      const p1 = new THREE.PointLight(0x00f0ff, 1, 30);
      p1.position.set(8, 8, 8);
      scene.add(p1);
      const p2 = new THREE.PointLight(0x00ff88, 0.6, 30);
      p2.position.set(-8, -4, -8);
      scene.add(p2);
    }

    // ─── Actualizar etiquetas HTML ───
    function updateLabels() {
      labelElements.forEach(({ element, node }) => {
        const pos = node.position.clone().project(camera);
        const x = (pos.x * 0.5 + 0.5) * container.clientWidth;
        const y = (-pos.y * 0.5 + 0.5) * container.clientHeight;
        element.style.left = x + 'px';
        element.style.top  = y + 'px';
        const inFront = pos.z < 1 && pos.z > 0;
        const inView  = x > -100 && x < container.clientWidth + 100 && y > -50 && y < container.clientHeight + 50;
        element.classList.toggle('visible', inFront && inView);
      });
    }

    // ─── Click en nodo ───
    function onCanvasClick(event) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(nodeMeshes);
      if (hits.length > 0) showDetail(hits[0].object.userData.intern);
    }

    // ─── Hover en nodo ───
    function onCanvasMouseMove(event) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(nodeMeshes);
      if (hits.length > 0) {
        canvas.style.cursor = 'pointer';
        const obj = hits[0].object;
        if (hoveredNode !== obj) {
          if (hoveredNode) {
            hoveredNode.userData.baseScale = 1;
            hoveredNode.userData.sprite.material.opacity = 0.45;
          }
          hoveredNode = obj;
          hoveredNode.userData.baseScale = 1.5;
          hoveredNode.userData.sprite.material.opacity = 0.8;
        }
      } else {
        canvas.style.cursor = 'grab';
        if (hoveredNode) {
          hoveredNode.userData.baseScale = 1;
          hoveredNode.userData.sprite.material.opacity = 0.45;
          hoveredNode = null;
        }
      }
    }

    // ─── Mostrar detalle ───
    function showDetail(intern) {
      const color = cohortColors[intern.cohort];
      document.getElementById('detail-content').innerHTML = `
        <div style="animation:fadeInUp .5s ease-out both">
          <div class="relative mb-6">
            <img src="${intern.avatar}" alt="${intern.name}"
              class="w-28 h-28 rounded-2xl object-cover border-2" style="border-color:${color}">
            <div class="absolute -bottom-2 -right-2 w-8 h-8 rounded-lg flex items-center justify-center text-xs font-mono font-bold"
              style="background:${color};color:var(--bg)">${intern.cohort + 1}</div>
          </div>
          <h3 class="font-display font-800 text-2xl tracking-tight mb-1">${intern.name}</h3>
          <p class="font-mono text-sm mb-3" style="color:${color}">${intern.role}</p>
          <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-mono mb-6"
            style="background:rgba(255,255,255,0.04);border:1px solid var(--border)">
            <i class="fas fa-calendar-alt" style="color:${color}"></i>
            ${intern.period}
          </div>
          <p class="text-[var(--muted)] text-sm leading-relaxed mb-6">${intern.description}</p>
          <div class="mb-2 text-xs font-mono text-[var(--muted)] uppercase tracking-wider">Skills</div>
          <div class="flex flex-wrap">
            ${intern.skills.map(s => `<span class="skill-tag" style="color:${color};border-color:${color}33">${s}</span>`).join('')}
          </div>
          <div class="mt-8 pt-6 border-t border-[var(--border)]">
            <p class="text-xs font-mono text-[var(--muted)]">
              <i class="fas fa-building mr-1" style="color:${color}"></i>
              Oficina de Tecnologias de la Informacion
            </p>
          </div>
        </div>
      `;
      document.getElementById('detail-panel').classList.add('open');
      document.getElementById('detail-backdrop').classList.add('open');
    }

    // ─── Cerrar detalle ───
    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('open');
      document.getElementById('detail-backdrop').classList.remove('open');
    }
    document.getElementById('close-detail').addEventListener('click', closeDetail);
    document.getElementById('detail-backdrop').addEventListener('click', closeDetail);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // ─── Resize ───
    function onResize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / Math.max(1, h);
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    // ─── Loop de animación ───
    function animate() {
      requestAnimationFrame(animate);
      if (!spiralVisible) return;

      const elapsed = clock.getElapsedTime();

      if (tubeMaterial)  tubeMaterial.uniforms.uTime.value  = elapsed;
      if (haloMaterial)  haloMaterial.uniforms.uTime.value  = elapsed;

      nodeMeshes.forEach((node, i) => {
        node.rotation.y = elapsed * 0.5 + i * 0.3;
        node.rotation.x = Math.sin(elapsed * 0.3 + i) * 0.2;
        const pulse = 1 + Math.sin(elapsed * 2 + i * 0.5) * 0.08;
        const s = node.userData.baseScale * pulse;
        node.scale.set(s, s, s);
        if (node.userData.ring) {
          node.userData.ring.lookAt(camera.position);
          const rp = 1 + Math.sin(elapsed * 1.5 + i) * 0.1;
          node.userData.ring.scale.set(rp, rp, rp);
        }
      });

      const pts = scene.userData.particles;
      if (pts) {
        pts.rotation.y = elapsed * 0.015;
        pts.rotation.x = Math.sin(elapsed * 0.05) * 0.02;
      }

      controls.update();
      updateLabels();
      renderer.render(scene, camera);
    }

    // ─── Año en footer ───
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // ─── Arrancar ───
    loadAndInit();
  </script>
</body>
</html>
