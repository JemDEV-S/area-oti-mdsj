<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTI · Centro de Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { display: ['Space Grotesk','sans-serif'], mono: ['JetBrains Mono','monospace'] } } }
    }
  </script>
  <style>
    :root {
      --bg:#000008;--bg2:#06091a;--fg:#e8eaf0;--muted:#7888a8;
      --accent:#00f0ff;--accent2:#00ff88;--accent3:#ffb938;--accent4:#ff6b6b;
      --card:#0c1124;--border:rgba(120,140,200,0.18);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);background-image:radial-gradient(ellipse at top,rgba(0,240,255,0.04),transparent 50%),radial-gradient(ellipse at bottom right,rgba(255,185,56,0.04),transparent 50%);background-attachment:fixed;min-height:100vh}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--accent)}

    /* Modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,8,0.92);z-index:50;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
    .modal-backdrop.open{display:flex}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:8px;width:100%;max-width:780px;max-height:92vh;overflow-y:auto;padding:32px}
    .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}

    /* Section in modal */
    .form-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
    .form-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
    .form-section-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.25em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .form-section-title::before{content:'';width:14px;height:1px;background:var(--accent);display:inline-block}

    /* Form fields */
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    .field label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .field input,.field textarea,.field select{
      background:var(--bg2);border:1px solid var(--border);border-radius:4px;
      padding:9px 12px;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:14px;
      outline:none;transition:border-color .2s;width:100%;
    }
    .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
    .field textarea{resize:vertical;min-height:70px;font-family:'Space Grotesk',sans-serif}
    .field select option{background:var(--bg2)}
    .field input[type=color]{height:40px;padding:3px;cursor:pointer}
    .field input[type=range]{padding:0;height:24px}
    .field-hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px}

    /* Buttons */
    .btn{padding:9px 18px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px;letter-spacing:.05em;text-decoration:none;text-transform:uppercase}
    .btn-primary{background:var(--accent);color:var(--bg)}
    .btn-primary:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 0 20px rgba(0,240,255,0.3)}
    .btn-success{background:var(--accent2);color:var(--bg)}
    .btn-success:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 0 20px rgba(0,255,136,0.3)}
    .btn-warn{background:var(--accent3);color:var(--bg)}
    .btn-warn:hover{opacity:.85}
    .btn-danger{background:transparent;border:1px solid var(--accent4);color:var(--accent4)}
    .btn-danger:hover{background:var(--accent4);color:var(--bg)}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-ghost:hover{border-color:var(--fg);color:var(--fg)}
    .btn-icon{padding:7px 9px;border-radius:3px;font-size:11px}

    /* Table */
    table{width:100%;border-collapse:collapse}
    th{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:14px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:12px 16px;border-bottom:1px solid rgba(120,140,200,0.08);vertical-align:middle}
    tr:hover td{background:rgba(0,240,255,0.02)}

    /* Stat card */
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:18px 22px;position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--accent)}
    .stat-card.accent2::before{background:var(--accent2)}
    .stat-card.accent3::before{background:var(--accent3)}

    /* Director card */
    .director-card{background:linear-gradient(135deg,var(--card),rgba(255,185,56,0.05));border:1px solid var(--border);border-radius:8px;padding:24px;position:relative;overflow:hidden}
    .director-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent3),transparent)}
    .sun-preview{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff8e0,var(--sun-color,#ffb938) 60%);box-shadow:0 0 60px var(--sun-glow,rgba(255,185,56,0.5));flex-shrink:0}

    /* Planet preview */
    .planet-preview-sm{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.4),var(--p-color,#888) 70%);box-shadow:inset -8px -4px 12px rgba(0,0,0,0.6),0 0 16px var(--p-glow,rgba(0,240,255,0.3));position:relative;flex-shrink:0}
    .planet-preview-sm.has-rings::after{content:'';position:absolute;inset:-8px -4px;border:1px solid var(--p-color,#888);border-radius:50%;transform:rotate(-15deg);opacity:.6}

    /* Module chip */
    .skill-chip{display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(120,140,200,0.06);border:1px solid var(--border);margin:1px}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);z-index:200;border:1px solid;letter-spacing:.05em;text-transform:uppercase}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.ok{background:var(--card);border-color:var(--accent2);color:var(--accent2)}
    .toast.err{background:var(--card);border-color:var(--accent4);color:var(--accent4)}

    /* Filter input */
    .filter-input{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:9px 14px;color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
    .filter-input:focus{border-color:var(--accent)}
    .filter-input::placeholder{color:var(--muted)}

    /* Type badge */
    .type-badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase}
    .type-intern{background:rgba(0,240,255,0.1);color:var(--accent);border:1px solid var(--accent)}
    .type-contracted{background:rgba(255,185,56,0.1);color:var(--accent3);border:1px solid var(--accent3)}

    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .3s ease-out both}

    .section-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .section-label::before{content:'';width:14px;height:1px;background:var(--accent);display:inline-block}

    .planet-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.5;border-radius:6px;overflow:hidden}
  </style>
</head>
<body>

  <!-- Header -->
  <nav class="sticky top-0 z-40 backdrop-blur-xl px-6 py-4 flex items-center justify-between" style="background:rgba(0,0,8,0.92);border-bottom:1px solid var(--border)">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),var(--accent3))">
        <i class="fas fa-satellite-dish text-sm" style="color:var(--bg)"></i>
      </div>
      <div>
        <span class="font-display font-bold text-lg tracking-tight">OTI<span style="color:var(--accent)">.</span>Control</span>
        <span class="font-mono text-xs ml-3" style="color:var(--muted)">centro de operaciones</span>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <a href="/" class="btn btn-ghost"><i class="fas fa-globe"></i> Ver sistema</a>
      <button id="add-btn" class="btn btn-success"><i class="fas fa-plus"></i> Nuevo tripulante</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- DIRECTOR / SOL -->
    <section class="mb-10">
      <div class="section-label">Comandante del sistema</div>
      <div class="director-card" id="director-card"></div>
    </section>

    <!-- Stats -->
    <div id="stats-row" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8"></div>

    <!-- Filtros -->
    <div class="section-label">Tripulantes</div>
    <div class="flex flex-wrap gap-3 mb-5">
      <input id="search-input" class="filter-input flex-1 min-w-40" type="text" placeholder="Buscar por nombre, rol o designacion...">
      <select id="type-filter" class="filter-input">
        <option value="">Todos los tipos</option>
        <option value="intern">Practicantes</option>
        <option value="contracted">Contratados</option>
      </select>
      <select id="planet-type-filter" class="filter-input">
        <option value="">Todos los planetas</option>
        <option value="rocky">Rocoso</option>
        <option value="ice">Helado</option>
        <option value="gas">Gaseoso</option>
        <option value="earth">Terrestre</option>
        <option value="lava">Volcanico</option>
        <option value="desert">Desierto</option>
      </select>
    </div>

    <!-- Tabla -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <div class="px-5 py-4 flex items-center justify-between" style="border-bottom:1px solid var(--border)">
        <h2 class="font-display font-semibold text-base">Registros</h2>
        <span id="count-label" class="font-mono text-xs" style="color:var(--muted)"></span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Planeta</th>
              <th>Tripulante</th>
              <th>Tipo</th>
              <th>Rol</th>
              <th>Edad</th>
              <th>Nivel</th>
              <th style="text-align:right">Acciones</th>
            </tr>
          </thead>
          <tbody id="members-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal Director -->
  <div class="modal-backdrop" id="director-modal">
    <div class="modal fade-in" style="max-width:560px">
      <div class="flex items-center justify-between mb-6">
        <h3 class="font-display font-bold text-xl">Editar comandante</h3>
        <button class="btn btn-ghost btn-icon" data-close="director-modal"><i class="fas fa-xmark"></i></button>
      </div>
      <form id="director-form">
        <div class="form-section">
          <div class="form-section-title">Identidad</div>
          <div class="grid sm:grid-cols-2 gap-x-4">
            <div class="field"><label>Nombre *</label><input type="text" id="d-name" required></div>
            <div class="field"><label>Cargo *</label><input type="text" id="d-role" required></div>
            <div class="field sm:col-span-2"><label>Designacion estelar *</label><input type="text" id="d-planetName" required></div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Datos</div>
          <div class="grid sm:grid-cols-2 gap-x-4">
            <div class="field"><label>Edad *</label><input type="number" id="d-age" min="18" max="100" required></div>
            <div class="field"><label>Fecha ingreso *</label><input type="date" id="d-joinDate" required></div>
            <div class="field sm:col-span-2"><label>Biografia</label><textarea id="d-bio"></textarea></div>
            <div class="field sm:col-span-2"><label>Avatar URL</label><input type="url" id="d-avatar"></div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Apariencia estelar</div>
          <div class="grid sm:grid-cols-3 gap-x-4">
            <div class="field"><label>Color principal</label><input type="color" id="d-color" value="#ffb938"></div>
            <div class="field"><label>Color del nucleo</label><input type="color" id="d-coreColor" value="#fff4d6"></div>
            <div class="field"><label>Intensidad (0.5 - 2)</label><input type="number" step="0.1" min="0.5" max="2" id="d-intensity" value="1.2"></div>
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button type="button" class="btn btn-ghost" data-close="director-modal">Cancelar</button>
          <button type="submit" class="btn btn-warn"><i class="fas fa-save"></i> Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Miembro -->
  <div class="modal-backdrop" id="member-modal">
    <div class="modal fade-in">
      <div class="flex items-center justify-between mb-6">
        <h3 class="font-display font-bold text-xl" id="member-modal-title">Nuevo tripulante</h3>
        <button class="btn btn-ghost btn-icon" data-close="member-modal"><i class="fas fa-xmark"></i></button>
      </div>
      <form id="member-form">
        <input type="hidden" id="m-id">

        <div class="form-section">
          <div class="form-section-title">Identidad</div>
          <div class="grid sm:grid-cols-2 gap-x-4">
            <div class="field"><label>Nombre completo *</label><input type="text" id="m-name" required></div>
            <div class="field"><label>Designacion del planeta *</label><input type="text" id="m-planetName" required placeholder="Ej: Kepler-9"></div>
            <div class="field"><label>Rol *</label><input type="text" id="m-role" required></div>
            <div class="field">
              <label>Tipo *</label>
              <select id="m-type" required>
                <option value="intern">Practicante</option>
                <option value="contracted">Contratado</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Atributos</div>
          <div class="grid sm:grid-cols-3 gap-x-4">
            <div class="field">
              <label>Edad * (afecta tamano)</label>
              <input type="number" id="m-age" min="18" max="80" required>
            </div>
            <div class="field">
              <label>Fecha ingreso *</label>
              <input type="date" id="m-joinDate" required>
            </div>
            <div class="field">
              <label>Nivel de comando (1-10)</label>
              <input type="number" id="m-responsibility" min="1" max="10" value="3">
              <span class="field-hint">Mayor nivel = orbita mas cercana</span>
            </div>
            <div class="field sm:col-span-3"><label>Bio / Transmision</label><textarea id="m-bio"></textarea></div>
            <div class="field sm:col-span-2"><label>Skills (separados por coma)</label><input type="text" id="m-skills" placeholder="Ej: Python, Docker"></div>
            <div class="field"><label>Avatar URL</label><input type="url" id="m-avatar"></div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Personalizacion planetaria</div>
          <div class="grid sm:grid-cols-3 gap-x-4">
            <div class="field">
              <label>Tipo de planeta</label>
              <select id="p-type">
                <option value="rocky">Rocoso</option>
                <option value="ice">Helado</option>
                <option value="gas">Gaseoso</option>
                <option value="earth">Terrestre</option>
                <option value="lava">Volcanico</option>
                <option value="desert">Desierto</option>
              </select>
            </div>
            <div class="field"><label>Color principal</label><input type="color" id="p-primaryColor" value="#00f0ff"></div>
            <div class="field"><label>Color secundario</label><input type="color" id="p-secondaryColor" value="#0a3d4d"></div>

            <div class="field">
              <label>Numero de lunas (0-4)</label>
              <input type="number" id="p-moons" min="0" max="4" value="0">
            </div>
            <div class="field">
              <label>Inclinacion orbital (0 - 0.5)</label>
              <input type="number" id="p-inclination" step="0.05" min="0" max="0.5" value="0.1">
            </div>
            <div class="field">
              <label>Efecto especial</label>
              <select id="p-effect">
                <option value="none">Ninguno</option>
                <option value="glow">Resplandor</option>
                <option value="aurora">Aurora</option>
                <option value="storm">Tormenta</option>
              </select>
            </div>

            <div class="field sm:col-span-3">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                <input type="checkbox" id="p-hasRings" style="width:auto;cursor:pointer">
                <span>Tiene anillos</span>
              </label>
            </div>
            <div class="field"><label>Color de anillos</label><input type="color" id="p-ringColor" value="#88aacc"></div>
            <div class="field"><label>Inclinacion anillos (0 - 1)</label><input type="number" id="p-ringTilt" step="0.05" min="0" max="1" value="0.4"></div>
          </div>
        </div>

        <div id="form-error" class="font-mono text-xs mb-4" style="color:var(--accent4);display:none"></div>
        <div class="flex justify-end gap-3">
          <button type="button" class="btn btn-ghost" data-close="member-modal">Cancelar</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ─── Estado ───
    let director = null;
    let members = [];
    let editingId = null;

    // ─── API ───
    async function api(method, endpoint, body) {
      const opts = { method, headers: {} };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(endpoint, opts);
      if (res.status === 204) return null;
      if (!res.ok) {
        const t = await res.text();
        throw new Error(t || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // ─── Toast ───
    function toast(msg, ok = true) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${ok ? 'ok' : 'err'}`;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ─── Cargar datos ───
    async function load() {
      const data = await api('GET', '/api/data');
      director = data.director;
      members = data.members;
      renderDirector();
      renderStats();
      renderTable();
    }

    // ─── Render director ───
    function renderDirector() {
      const d = director;
      const color = d.appearance?.color || '#ffb938';
      document.getElementById('director-card').innerHTML = `
        <div class="flex items-center gap-6 flex-wrap">
          <div class="sun-preview" style="--sun-color:${color};--sun-glow:${color}80"></div>
          <div class="flex-1 min-w-0">
            <div class="font-mono text-xs mb-2" style="color:${color};letter-spacing:.2em;text-transform:uppercase">★ ${d.planetName}</div>
            <div class="font-display text-2xl font-bold mb-1">${d.name}</div>
            <div class="font-mono text-sm mb-3" style="color:var(--muted)">${d.role}</div>
            <div class="flex gap-4 text-xs font-mono" style="color:var(--muted)">
              <span><i class="fas fa-circle-dot mr-1"></i> ${d.age} ciclos</span>
              <span><i class="fas fa-calendar mr-1"></i> Desde ${new Date(d.joinDate).getFullYear()}</span>
            </div>
          </div>
          <button class="btn btn-warn" onclick="openDirectorEdit()"><i class="fas fa-pen"></i> Editar</button>
        </div>
      `;
    }

    // ─── Stats ───
    function renderStats() {
      const interns = members.filter(m => m.type === 'intern').length;
      const contracted = members.filter(m => m.type === 'contracted').length;
      const avgAge = members.length ? Math.round(members.reduce((s,m) => s + (m.age || 0), 0) / members.length) : 0;

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
          <div class="font-mono text-xs mb-2" style="color:var(--muted);letter-spacing:.15em">TRIPULANTES</div>
          <div class="font-mono text-3xl font-bold" style="color:var(--accent)">${members.length}</div>
        </div>
        <div class="stat-card accent2">
          <div class="font-mono text-xs mb-2" style="color:var(--muted);letter-spacing:.15em">PRACTICANTES</div>
          <div class="font-mono text-3xl font-bold" style="color:var(--accent2)">${interns}</div>
        </div>
        <div class="stat-card accent3">
          <div class="font-mono text-xs mb-2" style="color:var(--muted);letter-spacing:.15em">CONTRATADOS</div>
          <div class="font-mono text-3xl font-bold" style="color:var(--accent3)">${contracted}</div>
        </div>
        <div class="stat-card">
          <div class="font-mono text-xs mb-2" style="color:var(--muted);letter-spacing:.15em">EDAD MEDIA</div>
          <div class="font-mono text-3xl font-bold" style="color:var(--accent)">${avgAge}</div>
        </div>
      `;
    }

    // ─── Filtros ───
    function getFiltered() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      const type = document.getElementById('type-filter').value;
      const ptype = document.getElementById('planet-type-filter').value;
      return members.filter(m => {
        const matchQ = !q || m.name.toLowerCase().includes(q) || m.role.toLowerCase().includes(q) || (m.planetName||'').toLowerCase().includes(q);
        const matchT = !type || m.type === type;
        const matchP = !ptype || m.planet?.type === ptype;
        return matchQ && matchT && matchP;
      });
    }

    // ─── Tabla ───
    function renderTable() {
      const filtered = getFiltered();
      const tbody = document.getElementById('members-tbody');
      document.getElementById('count-label').textContent =
        filtered.length === members.length
          ? `${members.length} registros`
          : `${filtered.length} de ${members.length}`;

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 font-mono text-sm" style="color:var(--muted)">Sin resultados.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(m => {
        const p = m.planet || {};
        const color = p.primaryColor || '#888';
        const typeBadge = m.type === 'intern' ? 'type-intern' : 'type-contracted';
        const typeText = m.type === 'intern' ? 'Practicante' : 'Contratado';
        return `
          <tr>
            <td><span class="font-mono text-xs" style="color:var(--muted)">#${m.id}</span></td>
            <td>
              <div class="flex items-center gap-3">
                <div class="planet-preview-sm ${p.hasRings ? 'has-rings' : ''}" style="--p-color:${color};--p-glow:${color}66"></div>
                <div>
                  <div class="font-mono text-sm font-bold">${m.planetName || '—'}</div>
                  <div class="font-mono text-xs" style="color:var(--muted)">${p.type || 'unknown'}</div>
                </div>
              </div>
            </td>
            <td>
              <div class="font-semibold text-sm">${m.name}</div>
              <div class="font-mono text-xs" style="color:var(--muted)">${new Date(m.joinDate).toLocaleDateString('es-ES')}</div>
            </td>
            <td><span class="type-badge ${typeBadge}">${typeText}</span></td>
            <td><span class="text-sm">${m.role}</span></td>
            <td><span class="font-mono text-sm" style="color:var(--accent)">${m.age || '—'}</span></td>
            <td><span class="font-mono text-sm" style="color:var(--accent3)">${m.responsibilityLevel || '—'}/10</span></td>
            <td>
              <div class="flex items-center gap-1 justify-end">
                <button class="btn btn-ghost btn-icon edit-btn" data-id="${m.id}" title="Editar"><i class="fas fa-pen"></i></button>
                <button class="btn btn-danger btn-icon delete-btn" data-id="${m.id}" title="Eliminar"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      tbody.querySelectorAll('.edit-btn').forEach(btn =>
        btn.addEventListener('click', () => openMemberEdit(parseInt(btn.dataset.id))));
      tbody.querySelectorAll('.delete-btn').forEach(btn =>
        btn.addEventListener('click', () => deleteMember(parseInt(btn.dataset.id))));
    }

    // ─── Modal helpers ───
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      const form = document.querySelector(`#${id} form`);
      if (form) form.reset();
      const err = document.getElementById('form-error');
      if (err) err.style.display = 'none';
      editingId = null;
    }

    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => closeModal(btn.dataset.close));
    });
    document.querySelectorAll('.modal-backdrop').forEach(bd => {
      bd.addEventListener('click', e => {
        if (e.target === bd) closeModal(bd.id);
      });
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.querySelectorAll('.modal-backdrop.open').forEach(m => closeModal(m.id));
    });

    // ─── DIRECTOR: editar ───
    window.openDirectorEdit = () => {
      const d = director;
      document.getElementById('d-name').value = d.name;
      document.getElementById('d-role').value = d.role;
      document.getElementById('d-planetName').value = d.planetName;
      document.getElementById('d-age').value = d.age;
      document.getElementById('d-joinDate').value = d.joinDate?.slice(0,10) || '';
      document.getElementById('d-bio').value = d.bio || '';
      document.getElementById('d-avatar').value = d.avatar || '';
      document.getElementById('d-color').value = d.appearance?.color || '#ffb938';
      document.getElementById('d-coreColor').value = d.appearance?.coreColor || '#fff4d6';
      document.getElementById('d-intensity').value = d.appearance?.intensity || 1.2;
      openModal('director-modal');
    };

    document.getElementById('director-form').addEventListener('submit', async e => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('d-name').value.trim(),
        role: document.getElementById('d-role').value.trim(),
        planetName: document.getElementById('d-planetName').value.trim(),
        age: parseInt(document.getElementById('d-age').value),
        joinDate: document.getElementById('d-joinDate').value,
        bio: document.getElementById('d-bio').value.trim(),
        avatar: document.getElementById('d-avatar').value.trim(),
        appearance: {
          color: document.getElementById('d-color').value,
          coreColor: document.getElementById('d-coreColor').value,
          intensity: parseFloat(document.getElementById('d-intensity').value),
        },
      };
      try {
        await api('PUT', '/api/director', payload);
        toast('Comandante actualizado');
        closeModal('director-modal');
        await load();
      } catch (err) {
        toast('Error: ' + err.message, false);
      }
    });

    // ─── MIEMBRO: agregar/editar ───
    function openMemberAdd() {
      editingId = null;
      document.getElementById('member-modal-title').textContent = 'Nuevo tripulante';
      document.getElementById('member-form').reset();
      document.getElementById('m-id').value = '';
      // Defaults
      document.getElementById('m-responsibility').value = 3;
      document.getElementById('p-primaryColor').value = '#00f0ff';
      document.getElementById('p-secondaryColor').value = '#0a3d4d';
      document.getElementById('p-inclination').value = 0.1;
      document.getElementById('p-ringTilt').value = 0.4;
      openModal('member-modal');
    }

    function openMemberEdit(id) {
      const m = members.find(x => x.id === id);
      if (!m) return;
      editingId = id;
      document.getElementById('member-modal-title').textContent = 'Editar tripulante';
      document.getElementById('m-id').value = id;
      document.getElementById('m-name').value = m.name;
      document.getElementById('m-planetName').value = m.planetName || '';
      document.getElementById('m-role').value = m.role;
      document.getElementById('m-type').value = m.type || 'intern';
      document.getElementById('m-age').value = m.age || '';
      document.getElementById('m-joinDate').value = m.joinDate?.slice(0,10) || '';
      document.getElementById('m-responsibility').value = m.responsibilityLevel || 3;
      document.getElementById('m-bio').value = m.bio || '';
      document.getElementById('m-skills').value = (m.skills || []).join(', ');
      document.getElementById('m-avatar').value = m.avatar || '';

      const p = m.planet || {};
      document.getElementById('p-type').value = p.type || 'rocky';
      document.getElementById('p-primaryColor').value = p.primaryColor || '#00f0ff';
      document.getElementById('p-secondaryColor').value = p.secondaryColor || '#0a3d4d';
      document.getElementById('p-moons').value = p.moons || 0;
      document.getElementById('p-inclination').value = p.orbitInclination ?? 0.1;
      document.getElementById('p-effect').value = p.effect || 'none';
      document.getElementById('p-hasRings').checked = !!p.hasRings;
      document.getElementById('p-ringColor').value = p.ringColor || '#88aacc';
      document.getElementById('p-ringTilt').value = p.ringTilt ?? 0.4;

      openModal('member-modal');
    }

    document.getElementById('member-form').addEventListener('submit', async e => {
      e.preventDefault();
      const skills = document.getElementById('m-skills').value
        .split(',').map(s => s.trim()).filter(Boolean);

      const payload = {
        name: document.getElementById('m-name').value.trim(),
        planetName: document.getElementById('m-planetName').value.trim(),
        role: document.getElementById('m-role').value.trim(),
        type: document.getElementById('m-type').value,
        age: parseInt(document.getElementById('m-age').value),
        joinDate: document.getElementById('m-joinDate').value,
        responsibilityLevel: parseInt(document.getElementById('m-responsibility').value),
        bio: document.getElementById('m-bio').value.trim(),
        skills,
        avatar: document.getElementById('m-avatar').value.trim() ||
                `https://picsum.photos/seed/member-${Date.now()}/200/200.jpg`,
        planet: {
          type: document.getElementById('p-type').value,
          primaryColor: document.getElementById('p-primaryColor').value,
          secondaryColor: document.getElementById('p-secondaryColor').value,
          moons: parseInt(document.getElementById('p-moons').value),
          orbitInclination: parseFloat(document.getElementById('p-inclination').value),
          effect: document.getElementById('p-effect').value,
          hasRings: document.getElementById('p-hasRings').checked,
          ringColor: document.getElementById('p-ringColor').value,
          ringTilt: parseFloat(document.getElementById('p-ringTilt').value),
        },
      };

      try {
        if (editingId) {
          await api('PUT', `/api/members/${editingId}`, payload);
          toast(`${payload.name} actualizado`);
        } else {
          await api('POST', '/api/members', payload);
          toast(`${payload.name} agregado`);
        }
        closeModal('member-modal');
        await load();
      } catch (err) {
        const el = document.getElementById('form-error');
        el.textContent = 'Error: ' + err.message;
        el.style.display = 'block';
      }
    });

    async function deleteMember(id) {
      const m = members.find(x => x.id === id);
      if (!confirm(`Eliminar a ${m?.name}? Esta accion no se puede deshacer.`)) return;
      await api('DELETE', `/api/members/${id}`);
      toast(`${m?.name} eliminado`);
      await load();
    }

    // Eventos
    document.getElementById('add-btn').addEventListener('click', openMemberAdd);
    document.getElementById('search-input').addEventListener('input', renderTable);
    document.getElementById('type-filter').addEventListener('change', renderTable);
    document.getElementById('planet-type-filter').addEventListener('change', renderTable);

    // Iniciar
    load().catch(err => {
      document.getElementById('members-tbody').innerHTML =
        `<tr><td colspan="8" class="text-center py-12 font-mono text-sm" style="color:var(--accent4)">
          <i class="fas fa-triangle-exclamation mr-2"></i>Error cargando datos: ${err.message}
        </td></tr>`;
    });
  </script>
</body>
</html>
